<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | C-ops</title>

    <!-- CSS da página e da navbar -->
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/login.css">

    <!-- Fontes pega do Google fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <!-- Navbar com Logo e Link -->
    <div class="navbar">
        <img src="assets/home/logo-white.png" alt="" id="logo">
        <div class="links">
            <a href="index.html">
                <span>Inicio</span>
            </a>
            <a href="index.html#secao-historia">
                <span>Sobre o Jogo</span>
            </a>
            <a href="index.html#secao-modos">
                <span>Mapas e Modos</span>
            </a>
            <a href="index.html#secao-projeto">
                <span>Sobre o Projeto</span>
            </a>
            <div class="area_jogador">
                <a href="login.html">
                    <h3>Área do Jogador</h3>
                </a>
            </div>
        </div>
    </div>

    <div class="conteudo-imagem">
        <div class="conteudo-login-cadastro">
            <div class="titulo-login">
                <div class="fundo-titulo">
                    <h1 id="texto-login">Login</h1>
                </div>
            </div>
            <div class="campos-leitura">
                <div class="inputs-login">
                    <p class="texto-login">Email:</p>
                    <input type="text" id="ipt_email">
                    <p class="texto-login">Senha:</p>
                    <input type="text" id="ipt_senha">
                </div>
            </div>
            <div class="links-butao">
                <div class="buttao-login">
                    <button class="buttao-funcao-logar" onclick="entrar()">Logar</button>
                </div>
                <div class="link-cadastro">
                    <h3>Sua primeira vez? Faça o <a href="cadastro.html"><span id="texto-cadastro">Cadastro</span></a>
                    </h3>
                </div>
            </div>
        </div>
    </div>

</body>

</html>

<script>
    function entrar() {
        let email = ipt_email.value;
        let senha = ipt_senha.value;

        if (email == "" || senha == "") {
            alert("Os campos precisam ser preenchidos!");
            return;
        }

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
            },
            body: JSON.stringify({
                emailServer: email,
                senhaServer: senha
            }),
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NICK_USUARIO = json.nickname;
                    sessionStorage.ID_USUARIO = json.idUsuario;


                    window.location = "dashboard.html";

                });

            } else {

                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                    finalizarAguardar(texto);
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    }
</script>
