<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics | Cadastro</title>

    <link rel="stylesheet" href="../css/navbarDashboard.css">
    <link rel="stylesheet" href="../css/cadastroPartida.css">

    <!-- Fontes pega do Google fontes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

</head>

<body>


    <div class="conteudo-total">
        <div class="conteudo-navbar">
            <div class="navbar">
                <img src="../assets/home/logo-white.png" alt="">
                <div class="titulo-nome">
                    <h2>Bem vindo,<span class="nome-usuario" id="usuario">Stylish!</span></h1>
                </div>
                <div class="links-dashboard">
                    <div class="pagina">
                        <a href="">
                            <div class="texto-pagina">
                                <h2 class="nome-pagina">Cadastrar</h2>
                                <img src="../assets/dashboard/cadastro-cops.png" alt="">
                            </div>
                        </a>
                    </div>
                    <div class="pagina">
                        <a href="">
                            <div class="texto-pagina">
                                <h2 class="nome-pagina">Analisar</h2>
                                <img src="../assets/dashboard/mapeamento.png" alt="">
                            </div>
                        </a>
                    </div>
                    <div class="pagina">
                        <a href="">
                            <div class="texto-pagina">
                                <h2 class="nome-pagina">Conquistas</h2>
                                <img src="../assets/dashboard/titulos.png" alt="">
                            </div>
                        </a>
                    </div>
                    <div class="pagina">
                        <a href="">
                            <div class="texto-pagina">
                                <h2 class="nome-pagina">Setup</h2>
                                <img src="../assets/dashboard/setup.png" alt="">
                            </div>
                        </a>
                    </div>
                </div>
                <div class="dashboard-sair">
                    <button class="texto-sair" onclick="limparSessao()">
                        <h2 class="nome-sair">Sair</h2>
                        <img src="../assets/dashboard/sair.png" alt="">
                    </button>
                </div>
            </div>
        </div>

        <div class="conteudo-dashboard">

            <div class="conteudo-cadastro-partida" id="tela_partida">
                <div class="titulo-cadastro-partida">
                    <div class="fundo-titulo-partida">
                        <h1 id="texto-cadastro">Cadastrar Partida</h1>
                    </div>
                </div>
                <div class="campos-leitura">
                    <div class="inputs-cadastro">
                        <p class="texto-cadastro">Data da Partida:</p>
                        <input type="text" id="ipt_dataPartida" placeholder="AAAA-MM-DD">

                        <p class="texto-cadastro">Duração média (Minutos):</p>
                        <input type="text" id="ipt_duracaoMedia">

                        <p class="texto-cadastro">Rounds TR:</p>
                        <input type="number" id="ipt_roundTR">

                        <p class="texto-cadastro">Rounds CT:</p>
                        <input type="number" id="ipt_roundCT">

                        <p class="texto-cadastro">Mapa:</p>
                        <select class="selecionar_items" id="ipt_mapa">
                            <option value="1">Bureau</option>
                            <option value="2">Canals</option>
                        </select>

                        <p class="texto-cadastro">Resultado:</p>
                        <select class="selecionar_items" id="ipt_resultado">
                            <option value="0">Derrota</option>
                            <option value="1">Vitória</option>
                        </select>
                    </div>
                </div>
                <div class="links-butao">
                    <button class="buttao-funcao-cadastrar" onclick="cadastrarPartida()">Cadastrar Partida</button>
                </div>

                <div id="div_aguardar" class="loading-div" style="display: none;">
                    <img src="../assets/aguarde-orange.gif" id="loading-gif">
                </div>

            </div>

            <!-- A segunda tela, ela aparece so quando cadastra, pois ela esta com dispaky como none -->

            <div class="conteudo-cadastro-partida" id="tela_round" style="display: none;">
                <div class="titulo-cadastro-partida">
                    <div class="fundo-titulo-partida">
                        <h1>Cadastrar Round <span id="span_num_round">1</span></h1>
                    </div>
                </div>
                <div class="campos-leitura">
                    <div class="inputs-cadastro">
                        <p class="texto-cadastro">Vitória da Equipe:</p>
                        <select class="selecionar_items" id="ipt_vitoria">
                            <option value="TR">Terrorista</option>
                            <option value="CT">Contraterrorista</option>
                        </select>

                        <p class="texto-cadastro">Duração (segundos):</p>
                        <input type="number" id="ipt_duracao_round">

                        <h2 class="texto-evento">Registrar Evento</h2>

                        <p class="texto-cadastro">Tipo:</p>
                        <select class="selecionar_items" id="ipt_tipoEvento">
                            <option value="Abate">Abate (Kill)</option>
                            <option value="Morte">Morte</option>
                        </select>

                        <p class="texto-cadastro">Local do Mapa:</p>
                        <select class="selecionar_items" id="ipt_parteDoMapa">
                            <option value="1">Bomb A</option>
                            <option value="2">Bomb B</option>
                            <option value="3">Meio</option>
                        </select>
                    </div>
                </div>
                <div class="links-butao">
                    <button class="buttao-funcao-cadastrar" onclick="cadastrarRound()">Salvar Round</button>
                    <button class="buttao-funcao-cadastrar" style="background-color: #444;"
                        onclick="finalizar()">Finalizar</button>
                </div>
            </div>
        </div>


        <script>


            let idPartida = null;
            let numeroRoundAtual = 1;

            function cadastrarPartida() {

                aguardar();

                let data_partida = ipt_dataPartida.value;
                let duracao = ipt_duracaoMedia.value;
                let roundsTR = ipt_roundTR.value;
                let roundsCT = ipt_roundCT.value;
                let mapaRaw = ipt_mapa.value;
                let resultadoRaw = ipt_resultado.value;
                let usuario = sessionStorage.ID_USUARIO;

                if (duracao == "" || roundsTR == "" || roundsCT == "" || mapaRaw == "" || resultadoRaw == "") {
                    alert("Preencha todos os campos para cadastrar!");
                    return;
                }


                let mapa = Number(mapaRaw);
                let resultado = Number(resultadoRaw);
                let rTR = Number(roundsTR);
                let rCT = Number(roundsCT);

                if (rCT < 0 || rCT > 13 || rTR < 0 || rTR > 13) {
                    alert("Insira uma quantidade de rounds válida (0 a 13)");
                    return;
                }

                fetch("/partidas/cadastrar", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        data_partidaServer: data_partida == "" ? null : data_partida,
                        duracaoServer: Number(duracao),
                        roundsTRServer: rTR,
                        roundsCTServer: rCT,
                        resultadoServer: resultado,
                        usuarioServer: usuario,
                        mapaServer: mapa
                    }),
                }).then(function (resposta) {
                    console.log("RESPOSTA: ", resposta);

                    if (resposta.ok) {
                        finalizarAguardar();

                        setTimeout(() => {
                            alert("Cadastro de partida, realizado, agora simule cada round!");
                            document.getElementById("tela_partida").style.display = "none"; // Esconde a partida
                            document.getElementById("tela_round").style.display = "block";  // Mostra o round
                        }, "2000");
                    } else {
                        resposta.text().then(texto => {
                            console.error(texto);
                            alert("Erro no cadastro: " + texto);
                        });
                    }
                }) .catch(function (erro) {
                        console.log("#ERRO: ", erro);
                    });

                return false;
            }
        </script>
</body>

</html>

<script src="../js/sessao.js"></script>
